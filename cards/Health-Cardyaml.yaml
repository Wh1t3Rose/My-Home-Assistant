            {% set hy7 = state_attr('sensor.withings_hydration', 'hydration_7d') %}
            {% set hy30 = state_attr('sensor.withings_hydration', 'hydration_30d') %}

            {% set c3 = (hy - (hy3 | float)) if hy3 not in [none, 'unknown', 'unavailable', 'none', ''] else 0 %}
            {% set c7 = (hy - (hy7 | float)) if hy7 not in [none, 'unknown', 'unavailable', 'none', ''] else 0 %}
            {% set c30 = (hy - (hy30 | float)) if hy30 not in [none, 'unknown', 'unavailable', 'none', ''] else 0 %}

            {% if c7 >= -0.3 %}
              {% set trend_color = '#4caf50' %}
            {% elif c7 < -1.5 or c3 < -0.8 or c30 < -3.0 %}
              {% set trend_color = '#f44336' %}
            {% else %}
              {% set trend_color = '#ff9800' %}
            {% endif %}
            .name {
              font-size: 95%;
            }
            .header {
              padding-bottom: 0px;
            }
            .states {
              padding-bottom: 5px;
            }
            ha-card {
              padding-top: 4px !important;
            }
            .states.flex {
              font-weight: bold;
              font-size: 10px;
            }
            ha-card {
              --accent-color: {{ trend_color }};
            }
  - type: custom:mini-graph-card
    name: Sleep
    entities:
      - entity: sensor.tyler_phone_sleep_duration_3
        name: Sleep
        name_adaptive_color: true
    hours_to_show: 96
