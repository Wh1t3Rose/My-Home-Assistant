# Loads default set of integrations. Do not remove.
default_config:

frontend:
  themes: !include_dir_merge_named themes

http:

wake_on_lan:

switch:
  - platform: wake_on_lan
    name: Desktop
    mac: aa:bb:cc:dd:ee:ff
    broadcast_address: 192.168.1.55

timer:
  litter_box_timer:
    duration: "08:00:00"

input_number:
  hvac_power_cooling_w:
    name: HVAC Power Cooling
    min: 0
    max: 10000
    step: 50
    mode: box
    unit_of_measurement: W
    initial: 3000
  hvac_power_heating_w:
    name: HVAC Power Heating
    min: 0
    max: 10000
    step: 50
    mode: box
    unit_of_measurement: W
    initial: 3500
  hvac_power_fan_w:
    name: HVAC Power Fan
    min: 0
    max: 3000
    step: 25
    mode: box
    unit_of_measurement: W
    initial: 400
  hvac_power_idle_w:
    name: HVAC Power Idle
    min: 0
    max: 1000
    step: 5
    mode: box
    unit_of_measurement: W
    initial: 0
  electricity_rate_per_kwh:
    name: Electricity Rate
    min: 0
    max: 2
    step: 0.001
    mode: box
    unit_of_measurement: USD/kWh
    initial: 0.150

tts:
  - platform: google_translate

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

shopping_list:

smartir:

homeassistant:
  allowlist_external_dirs:
    - /config/www/doorbell/
    - /config/
  media_dirs:
    local: /config/
    snapshots: /config/www/doorbell/

homekit:
  filter:
    include_domains:
      - light
      - cover
      - switch
      - media_player
      - binary_sensor

notify:
  - name: Tyler_Desktop_HASS
    platform: hass_agent_notifier
    resource: http://192.168.1.133:5115/notify

emulated_hue:
  host_ip: 192.168.1.2
  listen_port: 8300
  advertise_ip: 192.168.1.2
  advertise_port: 8580
  off_maps_to_on_domains:
    - script
    - scene
  expose_by_default: true
  exposed_domains:
    - light
  entities:
    light.bedroom_light:
      name: Bedside Lamp
    light.ceiling_lights:
      hidden: true

################
# THERMOSTAT
################

climate:
  - platform: generic_thermostat
    name: House
    heater: switch.hvac_power
    ac_mode: true
    target_sensor: sensor.home_temp
    min_temp: 68
    max_temp: 78
    target_temp: 73
    cold_tolerance: 1.5
    hot_tolerance: 1.0
    initial_hvac_mode: cool
    precision: 0.1

################
# TEMPLATE
################

template:
  - trigger:
      - platform: state
        entity_id: climate.home
        to: "heating"
    sensor:
      - name: HVAC Runtime Hours
        unit_of_measurement: hours
        state: >
          {% set runtime = states('sensor.hvac_runtime_hours') | float(0) %}
          {% set elapsed = (as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed)) / 3600 %}
          {{ runtime + elapsed if trigger.from_state.state == 'heating' else runtime }}

  - sensor:
      - name: HVAC Gas Usage
        unit_of_measurement: therms
        state: >
          {% set runtime_hours = states('sensor.hvac_runtime_hours') | float(0) %}
          {% set therms_per_hour = 0.8 %}
          {{ runtime_hours * therms_per_hour }}

      - name: Marsh Weight
        unit_of_measurement: lbs
        state: >
          {% if states('sensor.litter_robot_4_pet_weight') | float < 10 %}
            {{ states('sensor.litter_robot_4_pet_weight') }}
          {% else %}
            unknown
          {% endif %}

      - name: BB Weight
        unit_of_measurement: lbs
        state: >
          {% if 9 <= states('sensor.litter_robot_4_pet_weight') | float < 15 %}
            {{ states('sensor.litter_robot_4_pet_weight') }}
          {% else %}
            unknown
          {% endif %}

      - name: Max Weight
        state: >
          {% if states('sensor.litter_robot_4_pet_weight') | float >= 15 %}
            {{ states('sensor.litter_robot_4_pet_weight') }}
          {% else %}
            unknown
          {% endif %}

      - name: UPS Power
        unique_id: ups_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set load = states('sensor.ups_load') | float(0) %}
          {% set nominal = states('sensor.ups_nominal_real_power') | float(0) %}
          {% if load > 0 and nominal > 0 %}
            {{ ((load / 100) * nominal) | round(1) }}
          {% else %}
            0
          {% endif %}

      - name: HVAC Estimated Power
        unique_id: hvac_estimated_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set action = state_attr('climate.home', 'hvac_action') | default('off') %}
          {% if action == 'cooling' %}
            {{ states('input_number.hvac_power_cooling_w') | float(0) }}
          {% elif action == 'heating' %}
            {{ states('input_number.hvac_power_heating_w') | float(0) }}
          {% elif action == 'fan' %}
            {{ states('input_number.hvac_power_fan_w') | float(0) }}
          {% elif action == 'idle' %}
            {{ states('input_number.hvac_power_idle_w') | float(0) }}
          {% else %}
            {{ states('input_number.hvac_power_idle_w') | float(0) }}
          {% endif %}

      - name: Office Power Usage
        unique_id: office_power_usage
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.ups_power') | float(0) }}

      - name: HVAC Energy Cost
        unique_id: hvac_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.hvac_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Office Energy Cost
        unique_id: office_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.ups_power_usage_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Total Energy Cost
        unique_id: total_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set hvac = states('sensor.hvac_energy_cost') | float(0) %}
          {% set office = states('sensor.office_energy_cost') | float(0) %}
          {{ (hvac + office) | round(2) }}

      - name: Home Lights Energy Cost
        unique_id: home_lights_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.all_lights_power_usage_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Fridge Energy Cost
        unique_id: fridge_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.power_fridge_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Microwave Energy Cost
        unique_id: microwave_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.microwave_power_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Entertainment Center Energy Cost
        unique_id: entertainment_center_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.entertainment_center_power_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Washer Dryer Energy Cost
        unique_id: washer_dryer_energy_cost
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh = states('sensor.washer_dryer_power_energy') | float(0) %}
          {{ (kwh * rate) | round(2) }}

      - name: Home Lights Energy Cost Monthly
        unique_id: home_lights_energy_cost_monthly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh_s = states('sensor.home_lights_energy_monthly') %}
          {% if kwh_s in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ ((kwh_s | float(0)) * rate) | round(4) }}
          {% endif %}

      - name: Fridge Energy Cost Monthly
        unique_id: fridge_energy_cost_monthly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh_s = states('sensor.fridge_energy_monthly') %}
          {% if kwh_s in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ ((kwh_s | float(0)) * rate) | round(4) }}
          {% endif %}

      - name: Microwave Energy Cost Monthly
        unique_id: microwave_energy_cost_monthly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh_s = states('sensor.microwave_energy_monthly') %}
          {% if kwh_s in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ ((kwh_s | float(0)) * rate) | round(4) }}
          {% endif %}

      - name: Entertainment Center Energy Cost Monthly
        unique_id: entertainment_center_energy_cost_monthly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh_s = states('sensor.entertainment_center_energy_monthly') %}
          {% if kwh_s in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ ((kwh_s | float(0)) * rate) | round(4) }}
          {% endif %}

      - name: Washer Dryer Energy Cost Monthly
        unique_id: washer_dryer_energy_cost_monthly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set kwh_s = states('sensor.washer_dryer_energy_monthly') %}
          {% if kwh_s in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ ((kwh_s | float(0)) * rate) | round(4) }}
          {% endif %}

      - name: Total Energy Cost Daily
        unique_id: total_energy_cost_daily
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set hvac = states('sensor.hvac_energy_daily') | float(0) %}
          {% set office = states('sensor.office_energy_daily') | float(0) %}
          {{ ((hvac + office) * rate) | round(2) }}

      - name: Total Energy Cost Weekly
        unique_id: total_energy_cost_weekly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set hvac = states('sensor.hvac_energy_weekly') | float(0) %}
          {% set office = states('sensor.office_energy_weekly') | float(0) %}
          {{ ((hvac + office) * rate) | round(2) }}

      - name: Total Energy Cost Monthly
        unique_id: total_energy_cost_monthly
        unit_of_measurement: USD
        device_class: monetary
        state_class: total
        state: >
          {% set rate = states('input_number.electricity_rate_per_kwh') | float(0) %}
          {% set hvac = states('sensor.hvac_energy_monthly') | float(0) %}
          {% set office = states('sensor.office_energy_monthly') | float(0) %}
          {{ ((hvac + office) * rate) | round(2) }}

powercalc:
  sensors:
    - entity_id: sensor.hvac_estimated_power
      power_sensor_id: sensor.hvac_estimated_power
      create_energy_sensor: true
      create_utility_meters: true
      utility_meter_types:
        - daily
        - monthly
    - entity_id: sensor.office_power_usage
      power_sensor_id: sensor.office_power_usage
      create_energy_sensor: true
      create_utility_meters: true
      ignore_unavailable_state: true
      unavailable_power: 0
      utility_meter_types:
        - daily
        - monthly

utility_meter:
  hvac_energy_daily:
    source: sensor.hvac_energy
    cycle: daily
  hvac_energy_weekly:
    source: sensor.hvac_energy
    cycle: weekly
  hvac_energy_monthly:
    source: sensor.hvac_energy
    cycle: monthly
  office_energy_daily:
    source: sensor.ups_power_usage_energy
    cycle: daily
  office_energy_weekly:
    source: sensor.ups_power_usage_energy
    cycle: weekly
  office_energy_monthly:
    source: sensor.ups_power_usage_energy
    cycle: monthly
  home_lights_energy_monthly:
    source: sensor.all_lights_power_usage_energy
    cycle: monthly
  fridge_energy_monthly:
    source: sensor.power_fridge_energy
    cycle: monthly
  microwave_energy_monthly:
    source: sensor.microwave_power_energy
    cycle: monthly
  entertainment_center_energy_monthly:
    source: sensor.entertainment_center_power_energy
    cycle: monthly
  washer_dryer_energy_monthly:
    source: sensor.washer_dryer_power_energy
    cycle: monthly

################
# SENSORS
################

sensor:

  - platform: integration
    source: sensor.hvac_estimated_power
    name: HVAC Energy
    unit_prefix: k
    round: 4
    method: left
    unique_id: hvac_energy

  - platform: integration
    source: sensor.ups_power
    name: UPS Energy
    unit_prefix: k
    round: 2
    method: left
    unique_id: ups_energy

  - platform: weatheralerts
    state: GA
    zone: 45
    county: 89

  - platform: command_line
    name: Deliveries Items Today
    command: "python3 /config/check_mail.py items"
    scan_interval: 120

  - platform: command_line
    name: Deliveries Count Today
    command: "python3 /config/check_mail.py count"
    scan_interval: 120

  - platform: statistics
    name: Bath Humidity Average
    entity_id: sensor.lumi_lumi_weather_humidity
    sampling_size: 40
    max_age:
      hours: 1
    state_characteristic: average_linear

  - platform: statistics
    name: Bath Humidity Statistics 5min Change
    entity_id: sensor.bad_raumsensor_bme280_humidity
    state_characteristic: change
    max_age:
      minutes: 5
    sampling_size: 30

  - platform: statistics
    name: Withings Weight Change 3d
    entity_id: sensor.withings_weight
    state_characteristic: change
    max_age:
      days: 3
    sampling_size: 800

  - platform: statistics
    name: Withings Weight Change 7d
    entity_id: sensor.withings_weight
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 1500

  - platform: statistics
    name: Withings Weight Change 30d
    entity_id: sensor.withings_weight
    state_characteristic: change
    max_age:
      days: 30
    sampling_size: 5000

  - platform: statistics
    name: Marsh Weight Change 14d
    entity_id: sensor.marsh_weight_3
    state_characteristic: change
    max_age:
      days: 14
    sampling_size: 3000

  - platform: statistics
    name: Max Weight Change 14d
    entity_id: sensor.max_weight_2
    state_characteristic: change
    max_age:
      days: 14
    sampling_size: 3000

  - platform: rest
    name: Glances - SERVER - Uptime
    resource: http://192.168.1.2:61208/api/3/uptime
    value_template: "{{ value_json }}"

  - platform: template
    sensors:
      number_of_lights_on:
        friendly_name: Number of Lights On
        unit_of_measurement: "on"
        value_template: "{{ states.light | selectattr('state','eq','on') | list | count }}"