        after: sunset
        before: sunrise
      - condition: state
        entity_id: sensor.tylerworkpc_sessionstate
        state: Unlocked
      sequence:
      - action: scene.apply
        data:
          entities:
            light.tyler_s_office_light_light:
              state: 'on'
              brightness_pct: 35
    - conditions:
      - condition: trigger
        id:
        - OfficeNoMotionClear
        - OfficeNoMotionClearLower
        - OfficeNoMotionOff
      - condition: state
        entity_id: sensor.tylerworkpc_sessionstate
        state: Locked
      sequence:
      - action: scene.apply
        data:
          entities:
            light.tyler_s_office_light_light:
