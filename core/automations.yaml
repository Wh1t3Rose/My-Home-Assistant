- id: '1731739312834'
  alias: Cat Litter - Waste Drawer Full Escalation - LR4
  description: Escalating reminders while waste drawer remains full.
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.litter_robot_4_waste_drawer
    for:
      hours: 0
      minutes: 5
      seconds: 0
    above: 98
    id: waste_full_initial
  - trigger: time_pattern
    hours: /2
    minutes: 0
    id: waste_full_repeat
  - trigger: time_pattern
    minutes: /30
    id: waste_critical_repeat
  - trigger: numeric_state
    entity_id:
    - sensor.litter_robot_4_waste_drawer
    below: 90
    for:
      hours: 0
      minutes: 10
      seconds: 0
    id: waste_cleared
  conditions: []
  actions:
  - variables:
      waste_level: '{{ states(''sensor.litter_robot_4_waste_drawer'') | float(0) }}'
      full_seconds: '{{ (as_timestamp(now()) - as_timestamp(states.sensor.litter_robot_4_waste_drawer.last_changed, 0)) | float(0) }}'
      quiet_hours: '{{ now().hour >= 22 or now().hour < 7 }}'
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id:
          - waste_full_initial
          - waste_full_repeat
        - condition: trigger
          id:
          - waste_critical_repeat
      - condition: template
        value_template: '{{ waste_level >= 98 }}'
      - condition: template
        value_template: '{{ not (trigger.id == ''waste_critical_repeat'' and full_seconds < 21600) }}'
      sequence:
      - action: persistent_notification.create
        data:
          title: Waste drawer full
          message: Waste drawer is {{ waste_level | round(1) }}%. Please empty ASAP.
          notification_id: litter_waste_full_status
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not quiet_hours }}'
          sequence:
          - action: notify.mobile_app_hannah_iphone
            data:
              title: Waste drawer full
              message: Waste drawer is {{ waste_level | round(1) }}%. Please empty ASAP.
          - action: notify.mobile_app_tyler_phone
            data:
              title: Waste drawer full
              message: Waste drawer is {{ waste_level | round(1) }}%. Please empty ASAP.
          - action: notify.mobile_app_pixel_tablet
            data:
              title: Waste drawer full
              message: Waste drawer is {{ waste_level | round(1) }}%. Please empty ASAP.
        - conditions:
          - condition: template
            value_template: '{{ quiet_hours and trigger.id == ''waste_full_initial'' }}'
          sequence:
          - action: notify.mobile_app_tyler_phone
            data:
              title: Waste drawer full (quiet hours)
              message: Waste drawer is {{ waste_level | round(1) }}%. Please empty in the morning if possible.
  - choose:
    - conditions:
      - condition: trigger
        id:
        - waste_critical_repeat
      - condition: template
        value_template: '{{ waste_level >= 99 and full_seconds >= 21600 }}'
      sequence:
      - action: persistent_notification.create
        data:
          title: 'CRITICAL: Waste drawer still full'
          message: Waste drawer has remained full for over 6 hours.
          notification_id: litter_waste_full_critical
  - choose:
    - conditions:
      - condition: trigger
        id:
        - waste_cleared
      sequence:
      - action: persistent_notification.dismiss
        data:
          notification_id: litter_waste_full_status
      - action: persistent_notification.dismiss
        data:
          notification_id: litter_waste_full_critical
      - action: notify.mobile_app_tyler_phone
        data:
          title: Waste drawer cleared
          message: Litterbox waste drawer has dropped below 90%.
  mode: single
