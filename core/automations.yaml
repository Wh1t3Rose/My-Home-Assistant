    id: SunsetUnlocked
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - OfficeMotionOnDetected
        - OfficeMotionOnDetectedLower
        - OfficeMotionOnOn
      - condition: sun
        after: sunset
        before: sunrise
      sequence:
      - action: scene.apply
        data:
