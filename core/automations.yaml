- id: '1733543613256'
  alias: Kenzie Heater Temp Control
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.kenzie_room_temp_sensor_temperature_2
    for:
      hours: 0
      minutes: 5
      seconds: 0
    above: 68
    id: TooHot
  - trigger: numeric_state
    entity_id:
    - sensor.kenzie_room_temp_sensor_temperature_2
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: TooCold
    below: 64
  - trigger: numeric_state
    entity_id:
    - sensor.kenzie_smart_plug_power_2
    for:
      hours: 0
      minutes: 1
      seconds: 0
    id: TooCold
    above: 50
  conditions:
  - condition: time
    after: '20:00:00'
    before: 08:00:00
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - TooHot
      sequence:
      - action: switch.turn_off
        metadata: {}
        data: {}
        target:
          device_id: e55e3ef4934e65f75213bc3dd6cbe909
    - conditions:
      - condition: trigger
        id:
        - TooCold
      sequence:
      - action: switch.turn_on
        metadata: {}
        data: {}
        target:
          device_id: e55e3ef4934e65f75213bc3dd6cbe909
    - conditions:
      - condition: trigger
        id:
        - Lefton10hr
      sequence:
      - action: switch.turn_off
        metadata: {}
        data: {}
        target:
          device_id: e55e3ef4934e65f75213bc3dd6cbe909
  mode: single
- id: '1733772973802'
  alias: Tyler Heading Home
  description: ''
  triggers:
  - entity_id:
    - person.tyler
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: state
    from: Tyler Work
  - trigger: state
    entity_id:
    - input_select.home_mode
    to: Arriving Home
    for:
      hours: 0
      minutes: 0
      seconds: 10
  conditions:
  - condition: time
    after: '16:00:00'
    before: '17:30:00'
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - action: notify.mobile_app_tyler_phone
    metadata: {}
    data:
      message: "Tyler is heading Home \U0001F697"
      title: Thermostat Adjusted ❄️
  - data_template:
      entity_id: climate.home
      hvac_mode: "{% if states('sensor.indoor_temperature') | float > 70 %}\n  cool\n{%
        elif states('sensor.indoor_temperature') | float < 66 %}\n  heat\n{% else
        %}\n  {{ 'cool' if states('sensor.outdoor_temperature') | float > 70 else
        'heat' }}\n{% endif %}\n"
    action: climate.set_hvac_mode
  - data_template:
      entity_id: climate.home
      temperature: "{% if states('sensor.indoor_temperature') | float > 70 %}\n  69\n{%
        elif states('sensor.indoor_temperature') | float < 66 %}\n  68\n{% else %}\n
        \ {{ states('climate.home') }}\n{% endif %}\n"
    action: climate.set_temperature
  - action: notify.mobile_app_hannah_iphone
    metadata: {}
    data:
      title: "Tyler is heading Home \U0001F697"
      message: Thermostat adjusted ❄️
  mode: single
