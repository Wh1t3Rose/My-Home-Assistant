- id: '1733190051901'
  alias: Dim Kitchen and Hall Lights at Sunset
  description: Gradually dims the kitchen and hall lights as the sun sets.
  triggers:
  - event: sunset
    offset: -00:30:00
    trigger: sun
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: light.group_kitchen_lights
      state: 'on'
    - condition: state
      entity_id: light.hall_light
      state: 'on'
  actions:
  - repeat:
      count: 10
      sequence:
      - data_template:
          entity_id:
          - light.group_kitchen_lights
          - light.hall_light_group
          brightness_step_pct: -10
        action: light.turn_on
      - delay:
          minutes: 3
  mode: single
- id: '1733263938900'
  alias: Thermostat - Winter Daytime
