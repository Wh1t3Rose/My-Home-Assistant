- id: '1747356560241'
  alias: Notification - Dryer Almost Done
  description: ''
  triggers:
  - entity_id:
    - sensor.washer_dryer_remaining_time
    trigger: state
  conditions:
  - condition: template
    value_template: "{% set from_parts = (trigger.from_state.state if trigger.from_state
      else '').split(':') %} {% set to_parts = (trigger.to_state.state if trigger.to_state
      else '').split(':') %} {% if from_parts | length != 3 or to_parts | length !=
      3 %}\n  false\n{% else %}\n  {% set from_remaining = (from_parts[0] | int(0))
      * 3600 + (from_parts[1] | int(0)) * 60 + (from_parts[2] | int(0)) %}\n  {% set
      to_remaining = (to_parts[0] | int(0)) * 3600 + (to_parts[1] | int(0)) * 60 +
      (to_parts[2] | int(0)) %}\n  {{ from_remaining > 1200 and to_remaining > 0 and
      to_remaining <= 1200 }}\n{% endif %}"
  actions:
  - data:
      title: Dryer is almost done!
      message: 20 minutes left!
      data:
        actions:
        - action: PAUSE_DRYER
          title: Pause
        - action: DISMISS
          title: Dismiss
    action: notify.mobile_app_tyler_phone
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''PAUSE_DRYER'' }}'
      sequence:
      - target:
          entity_id: button.washer_dryer_pause
        data: {}
        action: button.press
  mode: single
