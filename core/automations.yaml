    id: one_hour_fallback
  - trigger: template
    value_template: "{{\n  state_attr('calendar.ktcox92_gmail_com', 'start_time') not in [none, '', 'unknown', 'unavailable']\n  and (as_timestamp(as_datetime(state_attr('calendar.ktcox92_gmail_com', 'start_time'))) - as_timestamp(now())) <= 600\n  and (as_timestamp(as_datetime(state_attr('calendar.ktcox92_gmail_com', 'start_time'))) - as_timestamp(now())) > 540\n}}"
    id: ten_min_fallback
  conditions: []
  actions:
  - variables:
      event_title: '{{ trigger.calendar_event.summary | default(state_attr(''calendar.ktcox92_gmail_com'',
        ''message'') | default(''Family Event'', true), true) }}'
      event_start_raw: '{{ trigger.calendar_event.start | default(state_attr(''calendar.ktcox92_gmail_com'',
        ''start_time''), true) }}'
      event_start: '{{ as_datetime(event_start_raw, none) }}'
      event_time: '{% set ts = as_timestamp(event_start_raw, none) %}{{ ts | timestamp_custom(''%-I:%M
        %p'') if ts is not none else ''soon'' }}'
      event_tag: calendar_family_event
      quiet_hours: '{{ now().hour >= 22 or now().hour < 7 }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not quiet_hours }}'
      - condition: trigger
        id:
        - one_hour_family
        - one_hour_google
        - one_hour_fallback
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Family Calendar Reminder
          message: '{{ event_title }} starts at {{ event_time }} (in 1 hour).'
          data:
            tag: '{{ event_tag }}'
      - action: notify.mobile_app_hannah_iphone
        data:
          title: Family Calendar Reminder
          message: '{{ event_title }} starts at {{ event_time }} (in 1 hour).'
          data:
            tag: '{{ event_tag }}'
    - conditions:
      - condition: template
        value_template: '{{ not quiet_hours }}'
      - condition: trigger
        id:
        - ten_min_family
        - ten_min_google
        - ten_min_fallback
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Family Calendar Reminder
          message: '{{ event_title }} starts at {{ event_time }} (in 10 minutes).'
          data:
            tag: '{{ event_tag }}'
      - action: notify.mobile_app_hannah_iphone
        data:
          title: Family Calendar Reminder
          message: '{{ event_title }} starts at {{ event_time }} (in 10 minutes).'
          data:
            tag: '{{ event_tag }}'
  mode: single
- id: '1710710999001'
  alias: Bed Sensor Availability Alert
  description: Alert when Kenzie or Hannah bed sensor is unavailable for 10+ minutes. Re-alert hourly while unavailable, but only if Tyler is home.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.kenzie_bed_sensor_mat_mat_sensor
    - binary_sensor.slumber_bed_sensor
    to: unavailable
    for:
      minutes: 10
    id: SensorUnavailable
  - trigger: time_pattern
    minutes: /60
    id: HourlyCheck
  conditions:
  - condition: state
    entity_id: person.tyler
    state: home
  - condition: or
    conditions:
    - condition: state
      entity_id: binary_sensor.kenzie_bed_sensor_mat_mat_sensor
      state: unavailable
    - condition: state
      entity_id: binary_sensor.slumber_bed_sensor
      state: unavailable
  actions:
  - variables:
      unavailable_sensors: "{% set sensorlist = [] %}
{% if is_state('binary_sensor.kenzie_bed_sensor_mat_mat_sensor', 'unavailable') %}
  {% set _ = sensorlist.append('Kenzie Bed Sensor') %}
{% endif %}
{% if is_state('binary_sensor.slumber_bed_sensor', 'unavailable') %}
  {% set _ = sensorlist.append('Hannah Bedroom Sensor') %}
{% endif %}
{{ sensorlist | join(', ') }}
"
  - action: notify.mobile_app_tyler_phone
    data:
      title: Bed Sensor Unavailable ⚠️
      message: "{{ unavailable_sensors }} is offline. Please check the sensor connection."
      data:
        tag: bed_sensor_unavailable
        notification_id: bed_sensor_unavailable
  mode: single
