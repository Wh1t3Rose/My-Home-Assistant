    - binary_sensor.kenzie_bed_sensor_mat_mat_sensor
    to: 'on'
  conditions:
  - condition: time
    after: '20:00:00'
    weekday:
    - sun
  actions:
  - delay:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
  - action: light.turn_off
    target:
      entity_id: light.hannah_reading_light_light_4
    data: {}
  mode: single
- id: '1773374300000'
  alias: Night Office Presence - Kenzie Bedtime House Lights
  description: If Hannah is away and Kenzie is in bed after 8 PM, office motion turns
    off living room TV/light and reading light, and sets Tyler office light to 25%.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.office_motion_sensor
    to:
    - 'on'
    - detected
    - Detected
  conditions:
  - condition: time
    after: '20:00:00'
  - condition: state
    entity_id: person.hannah
    state: not_home
  - condition: template
    value_template: '{{
      is_state(''binary_sensor.kenzie_bed_sensor_mat_mat_sensor'', ''on'')
      or (
        is_state(''binary_sensor.kenzie_bed_sensor_mat_mat_sensor'', ''off'')
        and (as_timestamp(now()) - as_timestamp(states.binary_sensor.kenzie_bed_sensor_mat_mat_sensor.last_changed)) < 300
      )
      }}'
  actions:
  - action: media_player.turn_off
    target:
      entity_id: media_player.living_room_tv_2
    data: {}
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_light_fan
      - light.hannah_reading_light_light_4
    data:
      transition: 2
  - delay:
      hours: 0
      minutes: 0
      seconds: 1
      milliseconds: 0
  - action: light.turn_on
    target:
      entity_id: light.tyler_s_office_light_light
    data:
      brightness_pct: 25
      transition: 1
  mode: single
