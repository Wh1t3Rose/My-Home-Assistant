- id: '1693594509013'
  alias: Unraid Health Alerts
  description: Combined Unraid health alerts with trigger-based message routing.
  trigger:
  - platform: state
    entity_id: binary_sensor.unraid_cpu_usage_warning
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: cpu_usage_critical
  - platform: state
    entity_id: binary_sensor.unraid_disk1_usage_warning_sensor
    to: 'on'
    id: disk1_warning
  - platform: state
    entity_id: binary_sensor.unraid_disk2_usage_warning_sensor
    to: 'on'
    id: disk2_warning
  - platform: state
    entity_id: binary_sensor.unraid_disk3_usage_warning_sensor
    to: 'on'
    id: disk3_warning
  - platform: state
    entity_id: binary_sensor.unraid_appdata_cache_usage_warning_sensor
    to: 'on'
    id: appdata_warning
  - platform: state
    entity_id: binary_sensor.unraid_cpu_temp_warning
    to: 'on'
    for:
      hours: 0
      minutes: 3
      seconds: 0
    id: cpu_temp_critical
  - platform: state
    entity_id: binary_sensor.unraid_cpu_temp_warning
    to: 'on'
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: cpu_temp_warning
  - platform: state
    entity_id: binary_sensor.unraid_dl_cache_usage_warning_sensor
    to: 'on'
    id: dl_cache_warning
  - platform: state
    entity_id: binary_sensor.unraid_main_cache_usage_warning_sensor
    to: 'on'
    id: main_cache_warning
  condition: []
  action:
  - variables:
      alert_map:
        cpu_usage_critical:
          title: Unraid CPU 100%!!
          message: Unraid CPU 100%!!
        disk1_warning:
          title: Unraid Disk 1 Warning!!
          message: 90% usage warning!
        disk2_warning:
          title: Unraid Disk 2 Warning!!
          message: 90% usage warning!
        disk3_warning:
          title: Unraid Disk 3 Warning!!
          message: 90% usage warning!
        appdata_warning:
          title: Unraid AppData Warning!!
          message: 90% usage warning!
        cpu_temp_critical:
          title: Unraid CPU TEMP Critical!!
          message: TEMP is over 87C for over 3 minute!
        cpu_temp_warning:
          title: Unraid CPU TEMP Warning!!
          message: TEMP is over 75C for over 5 minutes!
        dl_cache_warning:
          title: Unraid DL Cache Warning!!
          message: 90% usage warning!
        main_cache_warning:
          title: Unraid Main Cache Warning!!
          message: 90% usage warning!
      alert: '{{ alert_map.get(trigger.id, {''title'':''Unraid Alert'',''message'':''Check
        Unraid status.''}) }}'
  - service: notify.mobile_app_tyler_phone
    data:
      title: '{{ alert.title }}'
      message: '{{ alert.message }}'
  - action: notify.mobile_app_pixel_tablet
    data:
      title: '{{ alert.title }}'
      message: '{{ alert.message }}'
  mode: single
- id: '1773509000001'
  alias: Notification Router - Quiet Hours and Escalation
  description: Route notifications by severity, defer non-urgent overnight, and escalate
    unacknowledged urgent alerts.
  triggers:
  - event_type: notification_router_event
    trigger: event
  conditions: []
  actions:
  - variables:
      payload: '{{ trigger.event.data if trigger and trigger.event and trigger.event.data
        else {} }}'
      title: '{{ payload.title | default(''Home Alert'', true) }}'
      message: '{{ payload.message | default(''No message provided.'', true) }}'
      severity: '{{ payload.severity | default(''nonurgent'', true) | lower }}'
      category: '{{ payload.category | default(''general'', true) | lower }}'
      is_urgent: '{{ severity in [''urgent'', ''critical''] }}'
      escalate: '{{ payload.escalate | default(false) }}'
      tag: '{{ payload.tag | default((''router_'' ~ now().strftime(''%Y%m%d%H%M%S'')),
        true) }}'
      in_quiet_hours: '{{ now().hour >= 22 or now().hour < 7 }}'
      ack_action: '{{ (''ACK_'' ~ tag) | upper | replace(''-'', ''_'') | replace(''
        '', ''_'') }}'
      digest_prev: '{{ state_attr(''persistent_notification.overnight_notification_digest'',
        ''message'') | default('''', true) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_urgent }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: '{{ title }}'
          message: '{{ message }}'
          data:
            tag: '{{ tag }}'
            actions:
            - action: '{{ ack_action }}'
              title: Acknowledge
      - action: notify.mobile_app_hannah_iphone
        data:
          title: '{{ title }}'
          message: '{{ message }}'
          data:
            tag: '{{ tag }}'
            actions:
            - action: '{{ ack_action }}'
              title: Acknowledge
      - action: notify.mobile_app_pixel_tablet
        data:
          title: '{{ title }}'
          message: '{{ message }}'
          data:
            tag: '{{ tag }}'
      - if:
        - condition: template
          value_template: '{{ category == ''weather'' }}'
        then:
        - action: persistent_notification.create
          data:
            title: Weather Alert Mode Active
            notification_id: weather_alert_mode
            message: '{{ now().strftime(''%Y-%m-%d %H:%M'') }} - {{ title }}: {{ message
              }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ escalate }}'
          sequence:
          - wait_for_trigger:
            - event_type: mobile_app_notification_action
              event_data:
                action: '{{ ack_action }}'
              trigger: event
            timeout:
              minutes: 2
            continue_on_timeout: true
          - if:
            - condition: template
              value_template: '{{ wait.trigger is none }}'
            then:
            - action: notify.mobile_app_tyler_phone
              data:
                title: '{{ title }}'
                message: 'Reminder: {{ message }}'
                data:
                  tag: '{{ tag }}'
            - action: notify.mobile_app_hannah_iphone
              data:
                title: '{{ title }}'
                message: 'Reminder: {{ message }}'
                data:
                  tag: '{{ tag }}'
            - action: notify.mobile_app_pixel_tablet
              data:
                title: '{{ title }}'
                message: 'Reminder: {{ message }}'
                data:
                  tag: '{{ tag }}'
            - wait_for_trigger:
              - event_type: mobile_app_notification_action
                event_data:
                  action: '{{ ack_action }}'
                trigger: event
              timeout:
                minutes: 3
              continue_on_timeout: true
            - if:
              - condition: template
                value_template: '{{ wait.trigger is none }}'
              then:
              - action: notify.alexa_media_tyler_s_echo_plus
                data:
                  title: '{{ title }}'
                  message: '{{ message }}'
              - action: light.turn_on
                target:
                  entity_id:
                  - light.group_kitchen_lights
                  - light.hall_light_group
                  - light.master_bathroom_light_group
                  - light.kenzie_room_lights
                  - light.tyler_s_office_light_light
                data:
                  flash: long
    default:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ in_quiet_hours }}'
        sequence:
        - action: persistent_notification.create
          data:
            title: Overnight Deferred Notifications
            notification_id: overnight_notification_digest
            message: '{% set line = now().strftime(''%I:%M %p'') ~ '' - '' ~ title
              ~ '': '' ~ message %} {% if digest_prev | trim != '''' %} {{ digest_prev
              }} {{ line }} {% else %} {{ line }} {% endif %}'
      default:
      - action: notify.mobile_app_tyler_phone
        data:
          title: '{{ title }}'
          message: '{{ message }}'
      - action: notify.mobile_app_hannah_iphone
        data:
          title: '{{ title }}'
          message: '{{ message }}'
      - action: notify.mobile_app_pixel_tablet
        data:
          title: '{{ title }}'
          message: '{{ message }}'
  mode: parallel
  max: 20
- id: '1773509000002'
  alias: Notification Router - Morning Digest Delivery
  description: Deliver morning summary with sleep stats 15 minutes after unplug after
    7 AM, or fallback at 10 AM.
  triggers:
  - trigger: state
    entity_id:
    - sensor.tyler_phone_battery_state_4
    from: charging
    to: discharging
    id: unplug_after_7
  - trigger: time
    at: '10:00:00'
    id: fallback_10a
  conditions: []
  actions:
  - variables:
      digest_text: '{{ state_attr(''persistent_notification.overnight_notification_digest'',
        ''message'') | default(''No deferred notifications.'', true) }}'
      sleep_duration: '{{ states(''sensor.tyler_phone_sleep_duration_4'') | default(''unknown'',
        true) }}'
      sleep_seconds: "{% set s = states('sensor.tyler_phone_sleep_duration_4') | default('', true) | trim %} {% if ':' in s %}\n  {% set p = s.split(':') %}\n  {% if p | length == 3 %}\n    {{ (p[0] | int(0)) * 3600 + (p[1] | int(0)) * 60 + (p[2] | int(0)) }}\n  {% elif p | length == 2 %}\n    {{ (p[0] | int(0)) * 60 + (p[1] | int(0)) }}\n  {% else %}\n    0\n  {% endif %}\n{% else %}\n  {{ (s | float(0)) * 3600 }}\n{% endif %}"
      summary_message: 'Sleep duration: {{ sleep_duration }}

        Overnight digest: {{ digest_text }}'
  - choose:
    - conditions:
      - condition: trigger
        id:
        - unplug_after_7
      - condition: time
        after: 07:00:00
      sequence:
      - delay:
          hours: 0
          minutes: 15
          seconds: 0
      - action: notify.mobile_app_tyler_phone
        data:
          title: Morning Home Summary
          message: '{{ summary_message }}'
      - action: notify.mobile_app_hannah_iphone
        data:
          title: Morning Home Summary
          message: '{{ summary_message }}'
      - action: notify.mobile_app_pixel_tablet
        data:
          title: Morning Home Summary
          message: '{{ summary_message }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ sleep_seconds | float(0) > 0 and sleep_seconds | float(0)
              < 23400 }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.tyler_s_bedroom_lamp
            data:
              brightness_pct: 8
              transition: 120
          - action: notify.mobile_app_tyler_phone
            data:
              title: Sleep Recovery Mode
              message: Low sleep detected. Morning audio and lamp were set gentler.
      - action: persistent_notification.dismiss
        data:
          notification_id: overnight_notification_digest
    - conditions:
      - condition: trigger
        id:
        - fallback_10a
      - condition: template
        value_template: '{% set s = states.binary_sensor.tyler_phone_battery_state_4
          %} {% set seven = today_at(''07:00'') %} {{ not (s is not none and (s.state
          | lower) in [''unplugged'', ''off''] and s.last_changed >= seven) }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Morning Home Summary
          message: '{{ summary_message }}'
      - action: notify.mobile_app_hannah_iphone
        data:
          title: Morning Home Summary
          message: '{{ summary_message }}'
      - action: notify.mobile_app_pixel_tablet
        data:
          title: Morning Home Summary
          message: '{{ summary_message }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ sleep_seconds | float(0) > 0 and sleep_seconds | float(0)
              < 23400 }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.tyler_s_bedroom_lamp
            data:
              brightness_pct: 8
              transition: 120
          - action: notify.mobile_app_tyler_phone
            data:
              title: Sleep Recovery Mode
              message: Low sleep detected. Morning audio and lamp were set gentler.
      - action: persistent_notification.dismiss
        data:
          notification_id: overnight_notification_digest
  mode: single
- id: '1697303531541'
  alias: Washer Started - Live Notifications
  description: Sends live notifications with progress bar for washer cycle
  triggers:
  - entity_id:
    - sensor.washer_dryer_remaining_time
    - binary_sensor.washer_dryer_run_completed
    - sensor.washer_dryer_run_state
    trigger: state
  conditions: []
  actions:
  - variables:
      remaining_seconds: '{% set parts = states(''sensor.washer_dryer_remaining_time'').split('':'')
        | map(''int'') | list %} {{ parts[0]*3600 + parts[1]*60 + parts[2] }}

        '
      remaining_display: '{% set h = (remaining_seconds // 3600) %} {% set m = ((remaining_seconds
        % 3600) // 60) %} {% set s = (remaining_seconds % 60) %} {{ ''%d:%02d:%02d''
        | format(h, m, s) }}

        '
      cycle_seconds: '{{ states(''input_number.washer_cycle_start_minutes'') | float
        * 60 }}'
      progress: '{{ [cycle_seconds - remaining_seconds, 0] | max }}'
      progress_percent: '{{ ((progress | float / (cycle_seconds | float if (cycle_seconds
        | float) > 0 else 1)) * 100) | round(0) | int }}'
      run_state: '{{ states(''sensor.washer_dryer_run_state'') | default(''unknown'',
        true) }}'
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: binary_sensor.washer_dryer_run_completed
          state: 'on'
        - condition: template
          value_template: '{{ trigger.entity_id == ''sensor.washer_dryer_run_state''
            and trigger.from_state is not none and trigger.to_state is not none and
            trigger.from_state.state | lower == ''drying'' and trigger.to_state.state
            | lower != ''drying'' }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: washer_cycle
      - action: notify.mobile_app_pixel_tablet
        data:
          message: clear_notification
          data:
            tag: washer_cycle
    - conditions:
      - condition: numeric_state
        entity_id: sensor.washer_dryer_remaining_time
        above: 0
        enabled: false
      - condition: state
        entity_id: binary_sensor.washer_dryer_run_completed
        state:
        - 'off'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: "\U0001FAE7 Washer Cycle - {{ progress_percent }}%"
          message: 'State: {{ run_state }} | Remaining time: {{ remaining_display
            }}'
          data:
            tag: washer_cycle
            progress: '{{ progress }}'
            progress_max: '{{ cycle_seconds }}'
            live_update: true
            alert_once: true
      - action: notify.mobile_app_pixel_tablet
        data:
          title: "\U0001FAE7 Washer Cycle - {{ progress_percent }}%"
          message: 'State: {{ run_state }} | Remaining time: {{ remaining_display
            }}'
          data:
            tag: washer_cycle
            progress: '{{ progress }}'
            progress_max: '{{ cycle_seconds }}'
            live_update: true
            alert_once: true
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''sensor.washer_dryer_run_state''
          and trigger.from_state is not none and trigger.to_state is not none and
          trigger.from_state.state != trigger.to_state.state and trigger.to_state.state
          | lower not in [''unknown'', ''unavailable''] }}'
      sequence:
      - action: notify.mobile_app_hannah_iphone
        data:
          title: Washer/Dryer State Update
          message: 'State changed to {{ trigger.to_state.state }} | Remaining time:
            {{ remaining_display }}'
  mode: restart
