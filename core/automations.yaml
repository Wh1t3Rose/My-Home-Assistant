- id: '1718889949984'
  alias: Cat Litter - Low Level Escalation - LR4
  description: Aggressive escalation for low and empty litter states with repeated reminders.
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.litter_robot_4_litter_level
    below: 21
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: litter_low_initial
  - trigger: numeric_state
    entity_id:
    - sensor.litter_robot_4_litter_level
    below: 5
    for:
      hours: 0
      minutes: 2
      seconds: 0
    id: litter_empty_initial
  - trigger: time_pattern
    minutes: /30
    id: litter_low_repeat
  - trigger: time_pattern
    minutes: /10
    id: litter_empty_repeat
  - trigger: numeric_state
    entity_id:
    - sensor.litter_robot_4_litter_level
    above: 24
    for:
      hours: 0
      minutes: 10
      seconds: 0
    id: litter_recovered
  conditions: []
  actions:
  - variables:
      litter_level: '{{ states(''sensor.litter_robot_4_litter_level'') | float(0) }}'
      quiet_hours: '{{ now().hour >= 22 or now().hour < 7 }}'
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id:
          - litter_empty_initial
          - litter_empty_repeat
        - condition: trigger
          id:
          - litter_low_initial
          - litter_low_repeat
      - condition: template
        value_template: '{{ litter_level < 5 }}'
      sequence:
      - action: persistent_notification.create
        data:
          title: 'CRITICAL: Litterbox has no litter'
          message: Litter level is {{ litter_level | round(1) }}%. Refill now to avoid failed cycles.
          notification_id: litter_level_critical
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not quiet_hours }}'
          sequence:
          - choose:
            - conditions:
              - condition: state
                entity_id: person.tyler
                state: home
              sequence:
              - action: notify.mobile_app_tyler_phone
                data:
                  title: 'CRITICAL: Litterbox has no litter'
                  message: Litter level is {{ litter_level | round(1) }}%. Refill immediately.
                  data:
                    tag: litter_level_empty
            - conditions:
              - condition: state
                entity_id: person.hannah
                state: home
              sequence:
              - action: notify.mobile_app_hannah_iphone
                data:
                  title: 'CRITICAL: Litterbox has no litter'
                  message: Litter level is {{ litter_level | round(1) }}%. Refill immediately.
                  data:
                    tag: litter_level_empty
          - action: notify.mobile_app_pixel_tablet
            data:
              title: 'CRITICAL: Litterbox has no litter'
              message: Litter level is {{ litter_level | round(1) }}%. Refill immediately.
              data:
                tag: litter_level_empty
        - conditions:
          - condition: template
            value_template: '{{ quiet_hours and trigger.id == ''litter_empty_initial'' }}'
          sequence:
          - choose:
            - conditions:
              - condition: state
                entity_id: person.tyler
                state: home
              sequence:
              - action: notify.mobile_app_tyler_phone
                data:
                  title: 'CRITICAL: Litterbox has no litter (quiet hours)'
                  message: Litter level is {{ litter_level | round(1) }}%. Refill as soon as possible.
                  data:
                    tag: litter_level_empty
            - conditions:
              - condition: state
                entity_id: person.hannah
                state: home
              sequence:
              - action: notify.mobile_app_hannah_iphone
                data:
                  title: 'CRITICAL: Litterbox has no litter (quiet hours)'
                  message: Litter level is {{ litter_level | round(1) }}%. Refill as soon as possible.
                  data:
                    tag: litter_level_empty
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id:
          - litter_low_initial
          - litter_low_repeat
        - condition: trigger
          id:
          - litter_empty_initial
          - litter_empty_repeat
      - condition: template
        value_template: '{{ litter_level >= 5 and litter_level < 21 }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not quiet_hours }}'
          sequence:
          - choose:
            - conditions:
              - condition: state
                entity_id: person.tyler
                state: home
              sequence:
              - action: notify.mobile_app_tyler_phone
                data:
                  title: Litterbox low (aggressive alert)
                  message: Litter level is {{ litter_level | round(1) }}%. Refill soon.
                  data:
                    tag: litter_level_low
            - conditions:
              - condition: state
                entity_id: person.hannah
                state: home
              sequence:
              - action: notify.mobile_app_hannah_iphone
                data:
                  title: Litterbox low (aggressive alert)
                  message: Litter level is {{ litter_level | round(1) }}%. Fill to ensure proper clumping.
                  data:
                    tag: litter_level_low
          - action: notify.mobile_app_pixel_tablet
            data:
              title: Litterbox low (aggressive alert)
              message: Litter level is {{ litter_level | round(1) }}%. Refill soon.
              data:
                tag: litter_level_low
        - conditions:
          - condition: template
            value_template: '{{ quiet_hours and trigger.id == ''litter_low_initial'' }}'
          sequence:
          - choose:
            - conditions:
              - condition: state
                entity_id: person.tyler
                state: home
              sequence:
              - action: notify.mobile_app_tyler_phone
                data:
                  title: Litterbox low (quiet hours)
                  message: Litter level is {{ litter_level | round(1) }}%. Refill when possible.
                  data:
                    tag: litter_level_low
            - conditions:
              - condition: state
                entity_id: person.hannah
                state: home
              sequence:
              - action: notify.mobile_app_hannah_iphone
                data:
                  title: Litterbox low (quiet hours)
                  message: Litter level is {{ litter_level | round(1) }}%. Refill when possible.
                  data:
                    tag: litter_level_low
  - choose:
    - conditions:
      - condition: trigger
        id:
        - litter_recovered
      sequence:
      - action: persistent_notification.dismiss
        data:
          notification_id: litter_level_critical
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: litter_level_low
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: litter_level_empty
      - action: notify.mobile_app_hannah_iphone
        data:
          message: clear_notification
          data:
            tag: litter_level_low
      - action: notify.mobile_app_hannah_iphone
        data:
          message: clear_notification
          data:
            tag: litter_level_empty
      - action: notify.mobile_app_pixel_tablet
        data:
          message: clear_notification
          data:
            tag: litter_level_low
      - action: notify.mobile_app_pixel_tablet
        data:
          message: clear_notification
          data:
            tag: litter_level_empty
      - choose:
        - conditions:
          - condition: state
            entity_id: person.tyler
            state: home
          sequence:
          - action: notify.mobile_app_tyler_phone
            data:
              title: Litterbox level recovered
              message: Litter level is {{ litter_level | round(1) }}%.
        - conditions:
          - condition: state
            entity_id: person.hannah
            state: home
          sequence:
          - action: notify.mobile_app_hannah_iphone
            data:
              title: Litterbox level recovered
              message: Litter level is {{ litter_level | round(1) }}%.
  mode: single
