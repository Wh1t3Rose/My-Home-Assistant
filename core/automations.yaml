  description: Turn on kitchen lights on motion/occupancy with lux-based brightness.
    Use 100% when bright (>= 50 lux), 30% when dim, and 75% during 10p-6a if Kenzie
    has been out of bed for 3+ minutes. Auto-off after 2 minutes of vacancy.
  triggers:
  - entity_id: binary_sensor.kitchen_motion_sensor_occupancy
    to: 'on'
    id: KitchenOccupied
    trigger: state
  - entity_id: binary_sensor.kitchen_motion_sensor
    to: 'on'
    id: KitchenMotionDetected
    trigger: state
  - entity_id: binary_sensor.kitchen_motion_sensor_occupancy
    to: 'off'
    for:
      minutes: 2
    id: KitchenVacant
    trigger: state
  - device_id: 1b8a569dd8cbd074764b2c1c01ca77df
    domain: zha
    type: remote_button_short_press
    subtype: turn_on
    id: TurnOnButton
    trigger: device
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - KitchenOccupied
        - KitchenMotionDetected
      - condition: state
        entity_id: light.group_kitchen_lights
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: sensor.kitchen_motion_sensor_illuminance
            above: 49
          sequence:
          - target:
              entity_id: light.group_kitchen_lights
            action: light.turn_on
            data:
              brightness_pct: 100
              transition: 1
        - conditions:
