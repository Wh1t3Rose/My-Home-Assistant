    - sensor.l40s_ultra_ae_current_room
    - sensor.l40s_ultra_ae_state
    - sensor.l40s_ultra_ae_error
    - sensor.l40s_ultra_ae_battery
    - sensor.l40s_ultra_ae_side_brush_left
    - sensor.l40s_ultra_ae_filter_dirty_left
    - sensor.l40s_ultra_ae_wheel_dirty_left
    - sensor.l40s_ultra_ae_water_tank_draining
    - sensor.l40s_ultra_ae_self_clean
    - sensor.l40s_ultra_ae_auto_empty
    - sensor.l40s_ultra_ae_station_drainage_status
    - select.l40s_ultra_ae_cleaning_mode
  - trigger: state
