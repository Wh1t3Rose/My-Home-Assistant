        %} {% set start = now() %} {% set end = now() + timedelta(hours=12) %} {%
        for r in rows %}\n  {% set dt = as_datetime(r.datetime) %}\n  {% if dt and
        dt >= start and dt <= end and r.temperature is not none %}\n    {% set ns.vals
