      drying_progress: '{{ states(''sensor.l40s_ultra_ae_drying_progress'') | int(0)
        }}'
      current_room_raw: '{{ states(''sensor.l40s_ultra_ae_current_room'') }}'
      current_room: '{{ current_room_raw | replace(''_'', '' '') | title }}'
      vacuum_state: '{{ states(''sensor.l40s_ultra_ae_state'') }}'
      vacuum_state_norm: '{{ vacuum_state | lower | replace(''_'', '' '') | trim }}'
      vacuum_state_pretty: '{{ vacuum_state | replace(''_'', '' '') | title }}'
      vacuum_error: '{{ states(''sensor.l40s_ultra_ae_error'') }}'
      battery: '{{ states(''sensor.l40s_ultra_ae_battery'') | int(0) }}'
      side_brush_left: '{{ states(''sensor.l40s_ultra_ae_side_brush_left'') | int(0)
        }}'
      filter_dirty_left: '{{ states(''sensor.l40s_ultra_ae_filter_dirty_left'') |
        int(0) }}'
      wheel_dirty_left: '{{ states(''sensor.l40s_ultra_ae_wheel_dirty_left'') | int(0)
        }}'
      water_tank_status: '{{ states(''sensor.l40s_ultra_ae_water_tank_draining'')
        }}'
      self_clean: '{{ states(''sensor.l40s_ultra_ae_self_clean'') }}'
      auto_empty: '{{ states(''sensor.l40s_ultra_ae_auto_empty'') }}'
      station_drainage: '{{ states(''sensor.l40s_ultra_ae_station_drainage_status'')
        }}'
      cleaning_mode: '{{ states(''select.l40s_ultra_ae_cleaning_mode'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ vacuum_error == ''Wheels are suspended'' }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Alert
          message: 'Wheels suspended in room: {{ current_room }}'
      - action: notify.mobile_app_pixel_tablet
        data:
          title: Vacuum Alert
          message: 'Wheels suspended in room: {{ current_room }}'
    - conditions:
      - condition: template
        value_template: '{{ vacuum_state == ''Error'' and vacuum_error != ''Wheels
          are suspended'' }}

          '
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Error
          message: 'Error in room: {{ current_room }} – {{ vacuum_error }}'
      - action: notify.mobile_app_pixel_tablet
        data:
          title: Vacuum Error
          message: 'Error in room: {{ current_room }} – {{ vacuum_error }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ cleaning_progress >= 100 and drying_progress >= 100 }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Run Summary
          message: '{% set msgs = [] %} {% if wheel_dirty_left > 0 %}{% set _ = msgs.append(''Wheel
            Dirty: '' ~ wheel_dirty_left ~ ''%'') %}{% endif %} {% if side_brush_left
            < 20 %}{% set _ = msgs.append(''Side Brush Low: '' ~ side_brush_left ~
            ''%'') %}{% endif %} {% if filter_dirty_left < 20 %}{% set _ = msgs.append(''Filter
            Dirty: '' ~ filter_dirty_left ~ ''%'') %}{% endif %} {% if battery < 20
            %}{% set _ = msgs.append(''Battery Low: '' ~ battery ~ ''%'') %}{% endif
            %} {% if water_tank_status != ''OK'' %}{% set _ = msgs.append(''Water
            Tank: '' ~ water_tank_status) %}{% endif %} {% if self_clean == ''Running''
            %}{% set _ = msgs.append(''Self-Clean: Running'') %}{% endif %} {% if
            auto_empty == ''Running'' %}{% set _ = msgs.append(''Auto-Empty: Running'')
            %}{% endif %} {% if station_drainage != ''OK'' %}{% set _ = msgs.append(''Station
            Drainage: '' ~ station_drainage) %}{% endif %} {{ msgs | join('' | '')
            }}'
          data:
            tag: vacuum_progress
            message: ''
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ drying_progress > 0 and drying_progress < 100 }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Status
          message: 'Drying mop pads: {{ drying_progress }}%'
          data:
            tag: vacuum_progress
            progress: '{{ drying_progress }}'
            progress_max: 100
            live_update: true
            alert_once: true
    - conditions:
      - condition: template
        value_template: '{{ drying_progress >= 100 or ''charging'' in (vacuum_state
          | lower) }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: vacuum_progress
    - conditions:
      - condition: template
        value_template: '{{ vacuum_state | lower not in [''docked'',''idle''] and
          ''charging'' not in (vacuum_state | lower) }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Status
          message: 'Room: {{ current_room }}

            {% if vacuum_state_norm in [''sweeping'', ''vacuuming''] %} Sweeping: {{ cleaning_progress }}%

            {% elif vacuum_state_norm == ''mopping'' %} Mopping: {{ cleaning_progress }}%

            {% elif vacuum_state_norm == ''sweeping and mopping'' %} Sweeping and Mopping: {{ cleaning_progress }}%

            {% elif vacuum_state_norm == ''returning to dock'' %} Returning to Dock

            {% elif vacuum_state_norm in [''washing'', ''washing mop pads''] %} Washing Mop Pads

            {% elif vacuum_state_norm == ''cleaning and adding water'' %} Refilling clean
            water

            {% else %} {{ vacuum_state_pretty }} {% endif %}'
          data:
            tag: vacuum_progress
            progress: '{{ cleaning_progress }}'
            progress_max: 100
            live_update: true
            alert_once: true
    - conditions:
      - condition: template
        value_template: '{{ vacuum_state in [''Docked'', ''Idle''] }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: vacuum_progress
  mode: restart
