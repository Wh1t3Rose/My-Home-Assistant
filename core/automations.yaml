- id: '1731551054112'
  alias: Pause dryer at bedtime and resume on Tyler unplug
  description: Pause dryer after 10:30 PM with 30 minutes left when Hannah is in bed;
    resume in the morning when Tyler unplugs.
  triggers:
  - trigger: state
    entity_id:
    - sensor.washer_dryer_remaining_time
    id: ThirtyLeft
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - ThirtyLeft
      - condition: template
        value_template: "{% set from_parts = (trigger.from_state.state if trigger.from_state
          else '').split(':') %} {% set to_parts = (trigger.to_state.state if trigger.to_state
          else '').split(':') %} {% if from_parts | length != 3 or to_parts | length
          != 3 %}\n  false\n{% else %}\n  {% set from_remaining = (from_parts[0] |
          int(0)) * 3600 + (from_parts[1] | int(0)) * 60 + (from_parts[2] | int(0))
          %}\n  {% set to_remaining = (to_parts[0] | int(0)) * 3600 + (to_parts[1]
          | int(0)) * 60 + (to_parts[2] | int(0)) %}\n  {{ from_remaining > 1800 and
          to_remaining > 0 and to_remaining <= 1800 }}\n{% endif %}"
      - condition: or
        conditions:
        - condition: time
          after: '22:30:00'
        - condition: time
          before: 07:00:00
      - condition: state
        entity_id: binary_sensor.slumber_bed_sensor
        state: 'on'
      - condition: template
        value_template: '{{ states(''sensor.washer_dryer_run_state'') | lower == ''drying''
          }}'
      sequence:
      - action: button.press
        target:
          entity_id: button.washer_dryer_pause
        data: {}
      - wait_template: >-
          {{
            now().hour >= 7
            and (
              (states('sensor.tyler_phone_battery_state_4') | lower in ['discharging', 'none'])
              or (states('binary_sensor.tyler_phone_battery_state_4') | lower in ['off', 'unplugged'])
            )
          }}
        timeout:
          hours: 12
          minutes: 0
          seconds: 0
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ wait.completed }}'
          sequence:
          - action: button.press
            target:
              entity_id: button.washer_dryer_pause
            data: {}
          - action: notify.mobile_app_tyler_phone
            data:
              title: Washer/Dryer Resumed
              message: Washer/dryer cycle unpaused.
          - action: notify.mobile_app_hannah_iphone
            data:
              title: Washer/Dryer Resumed
              message: Washer/dryer cycle resumed.
          - delay:
              hours: 0
              minutes: 5
              seconds: 0
          - if:
            - condition: template
              value_template: '{{ states(''sensor.washer_dryer_run_state'') | lower != ''drying''
                and states(''binary_sensor.washer_dryer_run_completed'') != ''on'' }}'
            then:
            - action: notify.mobile_app_tyler_phone
              data:
                title: Dryer Restart Check
                message: Resume command sent, but dryer is not drying after 5 minutes.
            - action: notify.mobile_app_hannah_iphone
              data:
                title: Dryer Restart Check
                message: Resume command sent, but dryer is not drying after 5 minutes.
        - conditions:
          - condition: template
            value_template: "{{\n  (not wait.completed)\n  and (\n    (now().weekday()
              in [0, 1, 2, 3, 4] and now().strftime('%H:%M:%S') >= '08:30:00')\n    or\n
              \   (now().weekday() in [5, 6] and now().strftime('%H:%M:%S') >= '09:30:00')\n
              \ )\n}}"
          sequence:
          - action: button.press
            target:
              entity_id: button.washer_dryer_pause
            data: {}
          - action: notify.mobile_app_tyler_phone
            data:
              title: Washer/Dryer Resumed
              message: Washer/dryer cycle unpaused.
          - action: notify.mobile_app_hannah_iphone
            data:
              title: Washer/Dryer Resumed
              message: Washer/dryer cycle resumed.
          - delay:
              hours: 0
              minutes: 5
              seconds: 0
          - if:
            - condition: template
              value_template: '{{ states(''sensor.washer_dryer_run_state'') | lower != ''drying''
                and states(''binary_sensor.washer_dryer_run_completed'') != ''on'' }}'
            then:
            - action: notify.mobile_app_tyler_phone
              data:
                title: Dryer Restart Check
                message: Resume command sent, but dryer is not drying after 5 minutes.
            - action: notify.mobile_app_hannah_iphone
              data:
                title: Dryer Restart Check
                message: Resume command sent, but dryer is not drying after 5 minutes.
  mode: single
- id: '1731552898391'
  alias: Notification - Bedtime Reminder
  description: Remind Tyler based on next alarm so bedtime supports 7.5 hours asleep
    plus ~15 minutes to fall asleep.
  triggers:
