            after: '22:00:00'
            before: '06:00:00'
          - condition: template
            value_template: "{{ is_state('binary_sensor.kenzie_bed_sensor_mat_mat_sensor', 'off') and (as_timestamp(now()) - as_timestamp(states.binary_sensor.kenzie_bed_sensor_mat_mat_sensor.last_changed)) > 180 }}"
          sequence:
