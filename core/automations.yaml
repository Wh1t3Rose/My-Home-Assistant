  - trigger: state
    entity_id: binary_sensor.l40s_ultra_ae_charging_state
    to: charging
    for:
      hours: 0
      minutes: 6
      seconds: 0
    id: vacuum_charging_6m
  - trigger: state
    entity_id: binary_sensor.l40s_ultra_ae_charging_state
    to: 'on'
    for:
      hours: 0
      minutes: 6
      seconds: 0
    id: vacuum_charging_6m_on
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''sensor.l40s_ultra_ae_clean_water_tank_status''
          and trigger.to_state is not none and trigger.to_state.state | lower == ''low_water''
          }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Alert
          message: Clean water tank is low.
          data:
            tag: vacuum_low_water
      - action: notify.mobile_app_pixel_tablet
        data:
          title: Vacuum Alert
          message: Clean water tank is low.
          data:
            tag: vacuum_low_water
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''sensor.l40s_ultra_ae_clean_water_tank_status''
          and trigger.to_state is not none and trigger.to_state.state | lower == ''installed''
          }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: vacuum_low_water
      - action: notify.mobile_app_pixel_tablet
        data:
          message: clear_notification
          data:
            tag: vacuum_low_water
      - action: notify.mobile_app_tyler_phone
        data:
          title: Vacuum Status
          message: Clean water tank filled.
      - action: notify.mobile_app_pixel_tablet
        data:
          title: Vacuum Status
          message: Clean water tank filled.
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''binary_sensor.l40s_ultra_ae_charging_state''
          and trigger.to_state is not none and trigger.to_state.state | lower in [''charging'',''on'']
          }}'
      sequence:
      - action: notify.mobile_app_tyler_phone
        data:
          message: clear_notification
          data:
            tag: vacuum_progress
  - variables:
      cleaning_progress: '{{ states(''sensor.l40s_ultra_ae_cleaning_progress'') |
