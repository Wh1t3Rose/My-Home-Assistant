                          let lastSeenText = 'unknown';
                          if (lastSeenRaw && lastSeenRaw !== 'unknown' && lastSeenRaw !== 'unavailable') {
                            const seenDate = new Date(lastSeenRaw);
                            if (!isNaN(seenDate.getTime())) {
                              const mins = Math.max(0, Math.round((Date.now() - seenDate.getTime()) / 60000));
                              lastSeenText = `${mins} min ago`;
                            }
                          }

                          let litterColor = "#43a047";
                          if (litter < 30) litterColor = "#e53935";
                          else if (litter < 60) litterColor = "#fb8c00";

                          let wasteColor = "#43a047";
                          if (waste >= 80) wasteColor = "#e53935";
                          else if (waste >= 50) wasteColor = "#fb8c00";

                          return `
                          <div style="position:relative;text-align:center;color:#222">

                            <div style="
                              position:absolute;
                              top:8px;
                              right:8px;
                              width:12px;
                              height:12px;
                              border-radius:50%;
                              background:${dotColor};
                            "></div>

                            <div style="font-size:18px;font-weight:600;margin-bottom:6px">
                              Litter Box
                            </div>

                            <div style="margin-bottom:6px;">
                              <span style="font-size:11px;font-weight:700;color:#fff;background:${stateColor};padding:2px 7px;border-radius:12px;">
                                state: ${litterState}
                              </span>
                            </div>

                            <img src="/local/icons/litter_robot.png" width="70">

                            <div style="margin-top:10px;font-size:13px">
                              Litter: <span style="color:${litterColor};font-weight:600">${litter}%</span>
                              |
                              Waste: <span style="color:${wasteColor};font-weight:600">${waste}%</span>
                            </div>

                            <div style="font-size:13px;color:#555;margin-top:6px">
                              ${visits} visits today
                            </div>

                            <div style="font-size:12px;color:#555;margin-top:2px">
                              Last seen: ${lastSeenText}
                            </div>

                          </div>
                          `
                        ]]]
