                    {% elif change_7d > 0.5 %}
                    ⚠️ **Slight gain** of {{ change_7d | round(1) }} lbs this week. Stay consistent!
                    {% else %}
                    ➖ **Maintaining weight** this week. Good stability!
                    {% endif %}

                    ⚖️ **Current Weight:** {{ weight | round(1) }} lbs  
                    📌 **3-Day Change:** {{ change_3d | round(1) }} lbs  
                    📉 **7-Day Change:** {{ change_7d | round(1) }} lbs  
                    📊 **30-Day Change:** {{ change_30d | round(1) }} lbs  

                    {% if change_30d < -2 %}
                    🎯 Long-term trend looks great — keep up the momentum!
                    {% elif change_30d > 2 %}
                    🔁 Possible long-term gain. Maybe reevaluate habits.
                    {% else %}
